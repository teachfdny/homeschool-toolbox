<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img">
  <title>The Homeschool Toolbox</title>
  <!-- base -->
  <rect x="5" y="52" width="90" height="42" rx="8" fill="#2E8C82"/>
  <!-- lid body -->
  <rect x="5" y="28" width="90" height="28" rx="8" fill="#3AADA1"/>
  <!-- lid dome -->
  <ellipse cx="50" cy="28" rx="45" ry="18" fill="#3AADA1"/>
  <!-- lid highlight -->
  <ellipse cx="50" cy="18" rx="26" ry="8" fill="#5DD5C8" opacity="0.35"/>
  <!-- handle bar -->
  <rect x="34" y="4" width="32" height="7" rx="3.5" fill="#C9A97A"/>
  <!-- handle left leg -->
  <rect x="34" y="10" width="6" height="13" rx="3" fill="#C9A97A"/>
  <!-- handle right leg -->
  <rect x="60" y="10" width="6" height="13" rx="3" fill="#C9A97A"/>
  <!-- seam -->
  <rect x="5" y="50" width="90" height="4" rx="2" fill="#1E6B63"/>
  <!-- H left vertical -->
  <rect x="29" y="10" width="10" height="82" rx="3" fill="rgba(255,255,255,0.92)"/>
  <!-- H right vertical -->
  <rect x="61" y="10" width="10" height="82" rx="3" fill="rgba(255,255,255,0.92)"/>
  <!-- H crossbar -->
  <rect x="29" y="47" width="42" height="10" rx="3" fill="rgba(255,255,255,0.92)"/>
</svg>
